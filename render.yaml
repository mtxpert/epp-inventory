databases:
  - name: epp-inventory-db
    plan: free
    databaseName: epp_inventory
    user: epp

services:
  - type: web
    name: epp-inventory
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: epp-inventory-db
          property: connectionString
      - key: SHOPIFY_TOKEN
        sync: false
      - key: SHOPIFY_STORE
        value: edf236-3.myshopify.com
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        value: info@ecopowerparts.com
      - key: ALERT_RECIPIENTS
        value: info@ecopowerparts.com
      - key: MOUSER_API_KEY
        sync: false
