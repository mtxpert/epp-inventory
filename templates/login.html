{% extends "base.html" %}
{% block title %}Login — EPP Inventory{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <div class="card" style="text-align: center;">
        <h1 style="font-size: 24px; margin-bottom: 8px; color: #4fc3f7;">EPP Inventory</h1>
        <p style="color: #64748b; margin-bottom: 24px; font-size: 14px;">EcoPowerParts Inventory Manager</p>
        <form method="POST" action="{{ url_for('login') }}">
            <div style="margin-bottom: 16px; text-align: left;">
                <label style="font-size: 13px; color: #94a3b8; display: block; margin-bottom: 4px;">Email</label>
                <input type="email" name="email" required autofocus
                    style="width: 100%; padding: 10px 12px; background: #1f2937; border: 1px solid #374151; border-radius: 6px; color: #e0e0e0; font-size: 14px;">
            </div>
            <div style="margin-bottom: 24px; text-align: left;">
                <label style="font-size: 13px; color: #94a3b8; display: block; margin-bottom: 4px;">Password</label>
                <input type="password" name="password" required
                    style="width: 100%; padding: 10px 12px; background: #1f2937; border: 1px solid #374151; border-radius: 6px; color: #e0e0e0; font-size: 14px;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px;">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
