{% extends "base.html" %}
{% block title %}Set Your Password{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 80px auto;">
  <div class="card">
    <h1 style="font-size: 22px; margin-bottom: 6px; color: #4fc3f7;">Set Your Password</h1>
    <p style="color: #64748b; margin-bottom: 24px; font-size: 13px;">
      Please choose a new password before continuing.
    </p>
    {% if error %}
    <div class="flash error" style="margin-bottom:16px;">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div style="margin-bottom: 16px;">
        <label style="font-size: 13px; color: #94a3b8; display: block; margin-bottom: 4px;">New Password</label>
        <input type="password" name="new_password" required autofocus minlength="8"
          style="width:100%;box-sizing:border-box;padding:10px 12px;background:#1f2937;border:1px solid #374151;border-radius:6px;color:#e0e0e0;font-size:14px;">
      </div>
      <div style="margin-bottom: 24px;">
        <label style="font-size: 13px; color: #94a3b8; display: block; margin-bottom: 4px;">Confirm Password</label>
        <input type="password" name="confirm_password" required minlength="8"
          style="width:100%;box-sizing:border-box;padding:10px 12px;background:#1f2937;border:1px solid #374151;border-radius:6px;color:#e0e0e0;font-size:14px;">
      </div>
      <button type="submit" class="btn btn-success" style="width:100%;justify-content:center;padding:12px;">
        Save Password &amp; Continue
      </button>
    </form>
  </div>
</div>
{% endblock %}
